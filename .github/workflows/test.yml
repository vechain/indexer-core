name: Test

on:
  workflow_call:

permissions:
  contents: read
  id-token: write
  packages: write
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Test
        run: ./gradlew :package:cleanTest :package:test