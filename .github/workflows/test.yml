name: Test

on:
  workflow_call:

permissions:
  contents: read
  id-token: write
  packages: write
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Test
        run: ./gradlew cleanTest test

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v3
        if: success() || failure()
        with:
          report_paths: indexer-core/build/test-results/test/TEST-*.xml

      - name: Copy HTML Test Report
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p static/indexer-core
          if [ -d "indexer-core/build/reports/jacoco/test/html" ]; then
            cp -r indexer-core/build/reports/jacoco/test/html static/indexer-core/coverage
            cp -r indexer-core/build/reports/tests/test static/indexer-core/tests
          fi

      - name: Upload Test Results
        uses: actions/upload-artifact@v2
        if: github.ref == 'refs/heads/main'
        with:
          name: test-results-${{ github.head_ref || github.ref_name }}
          retention-days: 1
          path: static