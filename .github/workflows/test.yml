name: Test

on:
  workflow_call:

permissions:
  contents: read
  id-token: write
  packages: write
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Test
        run: ./gradlew cleanTest test

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: success() || failure()
        with:
          report_paths: build/test-results/test/TEST-*.xml

      - name: Copy HTML Test Report
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p static
          cp -r build/reports/jacoco/test/html static/coverage
          cp -r build/reports/tests/test static/tests

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: test-results-${{ github.head_ref || github.ref_name }}
          retention-days: 1
          path: static