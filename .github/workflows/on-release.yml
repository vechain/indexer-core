name: On release publish to maven central

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract Default Project Version from Gradle
        run: |
            echo "DEFAULT_PROJECT_VERSION=$(./gradlew properties -q | grep '^version:' | awk '{print $2}')" >> $GITHUB_ENV

      - name: Ensure the default project version matches the tag name (the workflow will fail if they don't match)
        run: |
          if [ "${{ github.event.release.tag_name }}" != "$DEFAULT_PROJECT_VERSION" ]; then
            echo "Error: Tag name (${{ github.event.release.tag_name }}) does not match the project version ($DEFAULT_PROJECT_VERSION)"
            exit 1
          fi

      - name: If this is a prerelease, append -SNAPSHOT to the version
        run: |
          if ${{ github.event.release.prerelease }}; then
            VERSION="${DEFAULT_PROJECT_VERSION}-SNAPSHOT"
          else
            VERSION=$DEFAULT_PROJECT_VERSION
          fi
          echo "PROJECT_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build the artifact
        run: ./gradlew build

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_SECRET_KEY }}" | gpg --batch --import
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill all

      - name: Publish the artifact to maven
        run: ./gradlew publishMavenJavaPublicationToMavenRepository
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}